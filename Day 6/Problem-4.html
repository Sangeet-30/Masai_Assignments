<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Masai Calculator </title>
    <link rel="stylesheet" href="Pro-4.css">
</head>
<body>
    
    <div id="heading">
        <h1>Masai Calculator</h1>
    </div>

    <div id="box">
        <div id="screen"></div>
        <div> <h2>1</h2> </div>
        <div> <h2>2</h2> </div>
        <div> <h2>3</h2> </div>
        <div class="black"> <h2>+</h2> </div>
        <div> <h2>4</h2> </div>
        <div> <h2>5</h2> </div>
        <div> <h2>6</h2> </div>
        <div class="black"> <h2>-</h2> </div>
        <div> <h2>7</h2> </div>
        <div> <h2>8</h2> </div>
        <div> <h2>9</h2> </div>
        <div class="black"> <h2>*</h2> </div>
        <div class="red"> <h2>C</h2> </div>
        <div> <h2>0</h2> </div>
        <div class="black"> <h2>=</h2> </div>
        <div class="black"> <h2>/</h2> </div>
    </div>

</body>
</html>
