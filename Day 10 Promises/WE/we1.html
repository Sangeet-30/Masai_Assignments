<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Promise on Count</title>
</head>

</body>
</html>

<script>

    let count = 4;
    let promise1 = new Promise(function(resolve,reject){

        if(count > 0){
            resolve("Positive Count")
        }
        else {
            reject("Negative Count")
        }
    })

    promise1
    .then(function(data){
        console.log(data)
    })
    .catch(function(data1){
        console.log(data1)
    })
    
    console.log(promise1)

</script>
