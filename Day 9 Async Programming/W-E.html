<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Timer Clock </title>
    <link rel="stylesheet" href="W-E.css">
</head>
<body>
    
    <header id="heading"> Timer Clock 🕒 </header>
     
    <div id="clock">

        <div id="clockHands">
            <span id="hour">00</span> <span> : </span>
            <span id="min">00</span> <span> : </span>
            <span id="sec">00</span>
        </div>
        
        <div id="hand_name">
            <div> Hours </div>
            <div> Minutes </div>
            <div> Seconds </div>
        </div>
    </div>

    <div id="buttons">
        <button id="start">
            <span> START </span>
            <span> ▶ </span>  
        </button>
        <button id="stop">
            <span> STOP </span>
            <span> ◼ </span> 
        </button>
        <button id="reset">
            <span> RESET </span>
            <span> ↻ </span>
        </button>
    </div>
    
</body>
</html>


<script>

    let hour_el = document.getElementById("hour")
    let min_el = document.getElementById("min")
    let sec_el = document.getElementById("sec")

    let startButton = document.getElementById("start")
        startButton.addEventListener("click",function(){

            let hour = 0 ;
            let min = 0 ;
            let sec = 0 ;

            time = setInterval(function(){
                sec ++
                if (sec>=60){
                    sec = 0
                    min ++ 
                    if (min>=60){
                        min = 0
                        hour ++
                        hour_el.innerText= String(hour).padStart(2,"0");
                        }
                    min_el.innerText = String(min).padStart(2,"0")
                    }
                sec_el.innerText = String(sec).padStart(2,"0")
                },1000)
        })

    let stopButton = document.getElementById("stop")
        stopButton.addEventListener("click",function(){
            clearInterval(time)
        })
        
    let resetButton = document.getElementById("reset")
        resetButton.addEventListener("click",function(){
            clearInterval(time)
            hour_el.innerText = "00"
            min_el.innerText = "00"
            sec_el.innerText = "00"

        })

    

</script>
